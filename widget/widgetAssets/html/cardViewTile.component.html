<div class="mp-tile-container" data-ng-click="$ctrl.onClickDetailPanel($ctrl.contentItem)" data-ng-class="{'mp-tile-disabled': $ctrl.contentItem.status === 'Installing'}">
    <div class="mp-tile-card position-relative">
        <div class="mp-tile-content">
            <div class="mp-tile-image-container" data-ng-if="$ctrl.config.mapping.showImg">
                <img data-ng-if="$ctrl.contentItem.imageURL" data-ng-src="{{$ctrl.contentItem.imageURL}}" class="mp-tile-image">
                <img data-ng-if="!$ctrl.contentItem.imageURL" data-ng-src="{{$ctrl.defaultImage}}" class="mp-tile-image">
            </div>
            <div class="mp-content-fixed-height" data-ng-class="{'margin-bottom-42': $ctrl.contentItem[$ctrl.config.mapping.subtitle2].length === 0 }">
                <h4 class="mp-tile-title margin-top-4 word-break truncate" title="{{$ctrl.contentItem[$ctrl.config.mapping.cardHeader]}}">{{$ctrl.contentItem[$ctrl.config.mapping.cardHeader]}}</h4>
                <div class="mp-tile-details">
                    <!-- <p class="margin-0"><span class="muted">Published:</span> {{$ctrl.contentItem.datePublished | unixToDate | date: $ctrl.appDatetimeFormat}}</p> -->
                    <p class="margin-0 truncate" title="{{$ctrl.contentItem[$ctrl.config.mapping.subtitle1]}}"><span class="muted">Type:</span>{{$ctrl.contentItem[$ctrl.config.mapping.subtitle1]}}</p>
                    <div class="threat-actor-intel-card-container">
                        <label data-ng-if="$ctrl.contentItem[$ctrl.config.mapping.subtitle2].length > 0" title="{{$ctrl.contentItem[$ctrl.config.mapping.subtitle2][0]}}" class="font-size-12 threat-actor-intel-card margin-top-md margin-right-md text-capitalize truncate" data-ng-class="{'width-66per': $ctrl.contentItem[$ctrl.config.mapping.subtitle2].length > 1}">{{$ctrl.contentItem[$ctrl.config.mapping.subtitle2][0]}}</label><span class="font-size-12 active-color margin-top-lg" data-ng-if="$ctrl.contentItem[$ctrl.config.mapping.subtitle2].length > 1">+{{$ctrl.contentItem[$ctrl.config.mapping.subtitle2].length - 1}} more</span>
                    </div>
                </div>
            </div>
            <span data-uib-tooltip-html="'{{$ctrl.contentItem[$ctrl.config.mapping.cardSubHeader].replaceAll('\'', '')}}'" data-tooltip-append-to-body="true" data-tooltip-placement="top">
                <p class="mp-tile-description muted-80">{{ $ctrl.contentItem[$ctrl.config.mapping.cardSubHeader] | stripTags }}</p>
            </span>
        </div>
    </div>
</div>
