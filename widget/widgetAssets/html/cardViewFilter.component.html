<div class="filterContainer">   
    <uib-accordion>
        <div uib-accordion-group is-open=true class="queue-card-wrapper panel-default filterGroup">        
                <div class="queue-card-header padding-left-md padding-right-12">
                    <div class="pull-left queue-card-header-text"
                        data-ng-class="{'queue-text-active-color': $ctrl.filterTabOpen}" >{{ ::'EDITOR.PORTER.FILTERS' | translate }}</div>
                        <button type="button" data-ng-disabled="$ctrl.searchByTags.recordTags.length === 0 && $ctrl.filteredArray.length===0" class="btn btn-sm btn-default padding-0 padding-right-sm padding-left-sm pull-right margin-right-33" 
                                data-ng-click="$ctrl.clearAllFiltersAndTags($event)" id="clear-filter-btn" title="{{ ::'COMPONENTS.GRID.CLEAR_ALL' | translate }}">
                                <span class="font-9px">{{ ::'COMPONENTS.GRID.CLEAR_ALL' | translate }}</span></button>
                    <div class="clearfix"></div>
                </div>
           <div class="accordionContainer">
            <uib-accordion data-ng-repeat="colFilter in $ctrl.filterColumns">
                <div uib-accordion-group is-open="colFilter.open" class="filter-header queue-card-wrapper panel-default">
                    <uib-accordion-heading>
                        <div class="queue-card-header padding-left-md padding-right-12">
                            <div class="font-size-13 font200 margin-right-sm pull-left"><span class="queue-card-actions">&nbsp;<i
                                        class="fa {{colFilter.open ? 'fa-chevron-down' : 'fa-chevron-right'}}"></i></span>
                            </div>
                            <div class="font-size-13 font200 pull-left queue-card-header-text margin-right-3" disable-button
                                data-ng-class="{'queue-text-active-color': colFilter.open || (colFilter.term && colFilter.term.length > 0)}">{{colFilter.field.title}}</div>
                            <button type="button" data-ng-show="colFilter.open" class="btn btn-sm btn-default margin-top-negative-3 padding-0 padding-right-sm padding-left-sm pull-right" 
                                data-ng-disabled="!colFilter.term" data-ng-click="$ctrl.clearFilter(null,colFilter)" id="clear-filter-btn" title="{{ ::'COMPONENTS.DATETIME_PICKER.CLEAR' | translate }}">
                                <span class="font-9px">{{ ::'COMPONENTS.DATETIME_PICKER.CLEAR' | translate }}</span></button>
                            <div class="clearfix"></div>
                        </div>
                    </uib-accordion-heading>
                    <div class="padding-bottom-md padding-right-lg padding-top-sm filterContent">
                        <div class="ui-grid-filter-container">
                            <div data-ng-if="colFilter.field.type !== 'file' && colFilter.field.type !== 'object' && ((colFilter.field.type!=='text' && colFilter.field.type !== 'integer' && colFilter.field.type !== 'datetime.quick' && colFilter.field.type !=='checkbox.select' && colFilter.field.type !=='email') || ((colFilter.field.type==='text' || colFilter.field.type === 'integer' || colFilter.field.type === 'datetime.quick' || colFilter.field.type ==='checkbox.select' || colFilter.field.type ==='email') && colFilter.field.encrypted !== true)) && colFilter.field.type !== 'cronfield'" data-cs-field="colFilter.field" data-ignore-editable="true" data-ng-model="colFilter.term" data-size="'small'" data-use-placeholder="'APP.LABEL.SEARCH' | translate" class="gridFilter" data-allow-add-tag="false" data-change-method="$ctrl.filterChanged" data-mode="'filterHeader'" data-form-name="'filterHeaderform'"></div>
                        </div>
                    </div>
                </div>
            </uib-accordion>
        </div>
        </div>
    </uib-accordion>
</div>
